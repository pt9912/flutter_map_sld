name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build analyze target
        run: docker build --target analyze -t flutter_map_sld:analyze .

  doc:
    name: Doc
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build doc target
        run: docker build --target doc -t flutter_map_sld:doc .

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build test target
        run: docker build --target test -t flutter_map_sld:test .

  analyze-io:
    name: Analyze IO
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build IO analyze target
        run: docker build --target io-analyze -t flutter_map_sld_io:analyze .

  test-io:
    name: Test IO
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build IO test target
        run: docker build --target io-test -t flutter_map_sld_io:test .
