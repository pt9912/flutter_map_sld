name: flutter_map_sld
description: >-
  Parse, validate, and use OGC Styled Layer Descriptor (SLD) and Symbology
  Encoding (SE) styles in Dart. Raster-first, pure Dart, no Flutter dependency.
version: 0.4.0
homepage: https://github.com/pt9912/flutter_map_sld
repository: https://github.com/pt9912/flutter_map_sld
topics:
  - gis
  - sld
  - ogc
  - geospatial
  - mapping

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  gml4dart: ^0.1.0
  xml: ^6.3.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
